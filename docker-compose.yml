services:
  postgres:
    image: postgres:16-alpine
    container_name: urlshortener_postgres
    command: postgres -c max_connections=200
    environment:
      POSTGRES_USER: ${DB_USER:-urluser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-urlpassword}
      POSTGRES_DB: ${DB_NAME:-urlshortener}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DB_USER:-urluser} -d ${DB_NAME:-urlshortener}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: urlshortener_redis
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: urlshortener_app
    env_file:
      - .env
    ports:
      - '${APP_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
